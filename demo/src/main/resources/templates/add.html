<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My ToDo App</title>
</head>
<body>
<h1>ToDo List</h1>

<form th:action="@{/add}" th:object="${todo}" method="post">
    <input type="text" th:field="*{title}">
    <p th:if="${#fields.hasErrors('title')}"
   th:errors="*{title}"
   style="color:red"></p>
     <input type="date" th:field="*{dueDate}">
     <p th:if="${#fields.hasErrors('dueDate')}"
   th:errors="*{dueDate}"
   style="color:red"></p>
    <button type="submit">Add</button>
</form>

<h3>Welcome</h3>

</body>
</html>
