<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Todo List</title>
</head>
<body>
    <h1>My Todo List</h1>


    <a href="/add">Add New Todo</a>
    <form th:action="@{/}" method="get">
    <input type="text" name="keyword" th:value="${keyword}" placeholder="Search todos..." />
    <button type="submit" th:disabled="${#lists.isEmpty(todos)}">Search</button>
</form>
<a th:href="@{/}">Clear</a>

<form th:action="@{/delete-all}" method="post" style="display:inline;">
    <button type="submit"  th:disabled="${#lists.isEmpty(todos)}" onclick="return confirm('Are you sure you want to delete ALL tasks?')">
        Delete All Tasks
    </button>
</form>

<form th:action="@{/delete-completed}" method="post" style="display:inline;">
    <button type="submit"  th:disabled="${#lists.isEmpty(todos)}" onclick="return confirm('Delete all COMPLETED tasks?')">
        Delete Completed Tasks
    </button>
</form>
<a href="/download"  target="_blank">
    <button th:disabled="${#lists.isEmpty(todos)}">Download Tasks</button>
</a>

    <ul>
        <div th:if="${#lists.isEmpty(todos)}">
    <p>No todos found.</p>
</div>
<div th:if="${!#lists.isEmpty(todos)}">

    <!-- your todo table -->


        <li th:each="todo : ${todos}">
            <form th:action="@{/toggle/{id}(id=${todo.id})}" method="post">
                <input type="checkbox" th:checked="${todo.completed}" onchange="this.form.submit()" />
                <span th:text="${todo.title}"></span>
                
                <span>-</span>
                 
                <span th:text="${todo.completed ? 'Completed' : 'Pending'}"></span>
                <span th:if="${todo.dueDate}" th:text="${todo.dueDate}"></span>
                <span th:unless="${todo.dueDate}">No due date</span>

            </form>
            
            
            <form th:action="@{/delete/{id}(id=${todo.id})}" method="post" style="display:inline;">
            <button type="submit">Delete</button>
        </form>
    
        
        <a th:href="@{/edit/{id}(id=${todo.id})}">Edit</a>
        </li>
        </div>
        
    </ul>
</body>
</html>
